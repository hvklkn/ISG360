services:
  postgres:
    image: postgres:16-alpine
    container_name: isg360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: isg360
    ports:
      - "5433:5432"
    volumes:
      - isg360_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d isg360"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  isg360_postgres_data:
